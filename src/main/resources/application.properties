## Spring DATASOURCE (DataSourceAutoConfiguration & DataSourceProperties)
spring.datasource.url = ${POP_DB_URL}
spring.datasource.username = ${POP_DB_USERNAME}
spring.datasource.password = ${POP_DB_PASSWORD}
spring.datasource.driver-class-name = org.postgresql.Driver

## Hibernate Properties
# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy = com.lsi.server.UpperTableStrategy
spring.jpa.show-sql=false

# Hibernate ddl auto (create, create-drop, validate, update)
# update: Hibernate creates/updates the schema from the JPA entities at boot
# (used for the MySQL -> shared PostgreSQL migration; data loaded separately).
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto = update

pop.token.secret=${POP_TOKEN_SECRET}
pop.token.ttl-seconds=${POP_TOKEN_TTL_SECONDS:86400}
pop.oauth.google.client-ids=${POP_GOOGLE_OAUTH_CLIENT_IDS:}
pop.oauth.apple.client-ids=${POP_APPLE_OAUTH_CLIENT_IDS:}
pop.oauth.facebook.app-id=${POP_FACEBOOK_APP_ID:}
pop.oauth.facebook.app-secret=${POP_FACEBOOK_APP_SECRET:}
pop.oauth.instagram.app-id=${POP_INSTAGRAM_APP_ID:}
pop.oauth.instagram.app-secret=${POP_INSTAGRAM_APP_SECRET:}
